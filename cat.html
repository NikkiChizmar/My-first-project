<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cat</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(to bottom, #cbe6ff 0%, #eaf6ff 60%, #dff0d8 100%);
    font-family: sans-serif;
  }
  .caption {
    position: absolute;
    bottom: 30px;
    color: #555;
    font-size: 14px;
  }
</style>
</head>
<body>

<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <!-- shadow -->
  <ellipse cx="250" cy="430" rx="120" ry="18" fill="#000" opacity="0.1"/>

  <!-- tail -->
  <path d="M 350 340 C 430 330, 450 250, 400 190" stroke="#e08a3c" stroke-width="34" fill="none" stroke-linecap="round"/>
  <path d="M 350 340 C 430 330, 450 250, 400 190" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="18 22"/>

  <!-- body -->
  <ellipse cx="250" cy="330" rx="115" ry="95" fill="#f2a45c"/>
  <ellipse cx="250" cy="360" rx="70" ry="55" fill="#ffffff"/>

  <!-- front paws -->
  <ellipse cx="205" cy="415" rx="24" ry="18" fill="#ffffff"/>
  <ellipse cx="295" cy="415" rx="24" ry="18" fill="#ffffff"/>

  <!-- head -->
  <circle cx="250" cy="200" r="95" fill="#f2a45c"/>

  <!-- ears -->
  <path d="M 175 150 L 150 70 L 225 130 Z" fill="#f2a45c"/>
  <path d="M 325 150 L 350 70 L 275 130 Z" fill="#f2a45c"/>
  <path d="M 182 140 L 165 90 L 215 128 Z" fill="#f9c7a0"/>
  <path d="M 318 140 L 335 90 L 285 128 Z" fill="#f9c7a0"/>

  <!-- white face patch -->
  <ellipse cx="250" cy="230" rx="65" ry="55" fill="#ffffff"/>

  <!-- tabby stripes on head -->
  <path d="M 200 115 Q 210 130 205 150" stroke="#d97f3d" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 230 105 Q 238 122 233 145" stroke="#d97f3d" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 300 115 Q 290 130 295 150" stroke="#d97f3d" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 270 105 Q 262 122 267 145" stroke="#d97f3d" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- stripes on body -->
  <path d="M 165 290 Q 180 300 168 320" stroke="#d97f3d" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 335 290 Q 320 300 332 320" stroke="#d97f3d" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="220" cy="205" rx="12" ry="16" fill="#3c2a1e"/>
  <ellipse cx="280" cy="205" rx="12" ry="16" fill="#3c2a1e"/>
  <circle cx="223" cy="200" r="3" fill="#fff"/>
  <circle cx="283" cy="200" r="3" fill="#fff"/>

  <!-- nose -->
  <path d="M 242 230 L 258 230 L 250 240 Z" fill="#e08a8a"/>

  <!-- mouth -->
  <path d="M 250 240 Q 250 248 238 250" stroke="#3c2a1e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 250 240 Q 250 248 262 250" stroke="#3c2a1e" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- whiskers -->
  <line x1="150" y1="215" x2="200" y2="220" stroke="#555" stroke-width="2"/>
  <line x1="150" y1="230" x2="200" y2="230" stroke="#555" stroke-width="2"/>
  <line x1="350" y1="215" x2="300" y2="220" stroke="#555" stroke-width="2"/>
  <line x1="350" y1="230" x2="300" y2="230" stroke="#555" stroke-width="2"/>

</svg>

<div class="caption">My orange and white cat 🐱</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Walking Cat</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(to bottom, #cfe9ff 0%, #eef8ff 55%, #d8ecc9 100%);
    font-family: sans-serif;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 14%;
    background: #cfe2b8;
    border-top: 3px solid #b7cf9e;
  }

  .caption {
    position: absolute;
    top: 24px;
    width: 100%;
    text-align: center;
    color: #555;
    font-size: 16px;
  }

  .walker {
    position: absolute;
    bottom: 14%;
    width: 260px;
    height: 185px;
    left: 5%;
    transform-origin: center;
    animation: walk 9s linear infinite;
  }

  @keyframes walk {
    0%   { left: 4%;  transform: scaleX(1); }
    45%  { left: 68%; transform: scaleX(1); }
    50%  { left: 68%; transform: scaleX(-1); }
    95%  { left: 4%;  transform: scaleX(-1); }
    100% { left: 4%;  transform: scaleX(1); }
  }

  .bobber {
    width: 100%;
    height: 100%;
    animation: bob 0.5s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .cat-svg { width: 100%; height: 100%; display: block; }

  .eye {
    transform-box: fill-box;
    transform-origin: center;
    animation: blink 4.5s infinite;
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    93% { transform: scaleY(0.1); }
    96% { transform: scaleY(1); }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="caption">My cat, walking back and forth 🐾</div>
  <div class="ground"></div>

  <div class="walker">
    <div class="bobber">
      <svg class="cat-svg" viewBox="0 0 460 320" xmlns="http://www.w3.org/2000/svg">

        <defs>
          <filter id="soften" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6"/>
          </filter>
        </defs>

        <!-- ground shadow -->
        <ellipse cx="220" cy="308" rx="150" ry="8" fill="#000" opacity="0.10"/>

        <!-- tail -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="8 90 210; -6 90 210; 8 90 210" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 90 210 C 55 200, 30 165, 45 130 C 55 105, 80 100, 85 120 C 88 135, 70 138, 62 125"
                fill="none" stroke="#231a14" stroke-width="20" stroke-linecap="round"/>
          <path d="M 90 210 C 55 200, 30 165, 45 130 C 55 105, 80 100, 85 120 C 88 135, 70 138, 62 125"
                fill="none" stroke="#e8944e" stroke-width="13" stroke-linecap="round"/>
        </g>

        <!-- back-far leg -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="-16 115 250; 16 115 250; -16 115 250" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 115 250 C 112 268, 110 285, 113 300" stroke="#231a14" stroke-width="26" fill="none" stroke-linecap="round"/>
          <path d="M 115 250 C 112 268, 110 285, 113 300" stroke="#d97f3d" stroke-width="18" fill="none" stroke-linecap="round"/>
        </g>
        <!-- front-far leg -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="-16 250 250; 16 250 250; -16 250 250" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 250 250 C 247 268, 245 285, 248 300" stroke="#231a14" stroke-width="26" fill="none" stroke-linecap="round"/>
          <path d="M 250 250 C 247 268, 245 285, 248 300" stroke="#d97f3d" stroke-width="18" fill="none" stroke-linecap="round"/>
        </g>

        <!-- body -->
        <ellipse cx="175" cy="215" rx="112" ry="72" fill="#e8944e" stroke="#231a14" stroke-width="7"/>

        <!-- white chest/belly patch, softened edge -->
        <path d="M 177 174 C 218 170, 245 179, 256 206 C 265 228, 254 255, 222 269 C 191 278, 155 273, 141 246 C 130 221, 141 192, 168 179 Z" fill="#ffffff" filter="url(#soften)"/>

        <!-- collar, oriented across the neck so it has visible height -->
        <path d="M 269 162 L 286 193" stroke="#231a14" stroke-width="24" stroke-linecap="round"/>
        <path d="M 269 162 L 286 193" stroke="#4a8f3c" stroke-width="16" stroke-linecap="round"/>
        <circle cx="291" cy="201" r="6" fill="#e8c547" stroke="#231a14" stroke-width="2.5"/>

        <!-- front-near leg -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="16 258 250; -16 258 250; 16 258 250" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 258 250 C 261 268, 263 285, 260 300" stroke="#231a14" stroke-width="26" fill="none" stroke-linecap="round"/>
          <path d="M 258 250 C 261 268, 263 285, 260 300" stroke="#e8944e" stroke-width="18" fill="none" stroke-linecap="round"/>
          <ellipse cx="260" cy="302" rx="15" ry="8" fill="#fbe9c9" stroke="#231a14" stroke-width="4"/>
        </g>
        <!-- back-near leg -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="16 108 250; -16 108 250; 16 108 250" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 108 250 C 111 268, 113 285, 110 300" stroke="#231a14" stroke-width="26" fill="none" stroke-linecap="round"/>
          <path d="M 108 250 C 111 268, 113 285, 110 300" stroke="#e8944e" stroke-width="18" fill="none" stroke-linecap="round"/>
          <ellipse cx="110" cy="302" rx="15" ry="8" fill="#fbe9c9" stroke="#231a14" stroke-width="4"/>
        </g>

        <!-- head, positioned so its base touches the top of the collar -->
        <circle cx="341" cy="143" r="65" fill="#e8944e" stroke="#231a14" stroke-width="7"/>

        <!-- ears -->
        <path d="M 303 101 L 314 57 L 339 95 Z" fill="#e8944e" stroke="#231a14" stroke-width="7" stroke-linejoin="round"/>
        <path d="M 310 106 L 318 75 L 332 101 Z" fill="#ffc9c9"/>
        <path d="M 355 95 L 368 55 L 388 99 Z" fill="#e8944e" stroke="#231a14" stroke-width="7" stroke-linejoin="round"/>
        <path d="M 361 101 L 369 74 L 382 99 Z" fill="#ffc9c9"/>

        <!-- eyes -->
        <g class="eye">
          <ellipse cx="328" cy="140" rx="10" ry="13" fill="#231a14"/>
        </g>
        <g class="eye">
          <ellipse cx="365" cy="137" rx="10" ry="13" fill="#231a14"/>
        </g>

        <!-- white muzzle patch, softened edge -->
        <path d="M 319 158 C 329 150, 356 150, 366 159 C 375 166, 371 179, 356 186 C 343 193, 325 190, 316 179 C 310 170, 311 163, 319 158 Z" fill="#ffffff" filter="url(#soften)"/>

        <!-- nose + mouth -->
        <path d="M 339 164 L 354 164 L 346 173 Z" fill="#231a14"/>
        <path d="M 346 173 Q 339 182 330 176" stroke="#231a14" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 346 173 Q 354 182 363 176" stroke="#231a14" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- whiskers -->
        <line x1="314" y1="155" x2="282" y2="149" stroke="#7a7a7a" stroke-width="2.5"/>
        <line x1="314" y1="162" x2="281" y2="162" stroke="#7a7a7a" stroke-width="2.5"/>
        <line x1="377" y1="153" x2="409" y2="146" stroke="#7a7a7a" stroke-width="2.5"/>
        <line x1="377" y1="160" x2="410" y2="158" stroke="#7a7a7a" stroke-width="2.5"/>

      </svg>
    </div>
  </div>
</div>

</body>
</html>

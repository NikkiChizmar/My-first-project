<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Walking Cat</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(to bottom, #cfe9ff 0%, #eef8ff 55%, #d8ecc9 100%);
    font-family: sans-serif;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 14%;
    background-color: #cfe2b8;
    border-top: 3px solid #b7cf9e;
  }

  .caption {
    position: absolute;
    top: 24px;
    width: 100%;
    text-align: center;
    color: #555;
    font-size: 16px;
  }

  .instructions {
    position: absolute;
    top: 50px;
    width: 100%;
    text-align: center;
    color: #777;
    font-size: 13px;
    line-height: 1.5;
  }

  .walker {
    position: absolute;
    bottom: calc(14% - 11px);
    width: 294px;
    height: 258px;
    left: 16%; /* fixed on screen — he always faces right and the world scrolls past him instead */
    transform-origin: center;
  }

  .bowl, .post, .yarn, .sign {
    position: absolute;
    bottom: 13%;
    transform: translateX(-50%);
    display: none;
    z-index: 3;
  }
  .bowl { width: 50px; height: 35px; }
  .post { width: 95px; height: 145px; }
  .yarn { width: 38px; height: 38px; }
  .sign { width: 100px; height: 150px; }

  .fish-prompt {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    background: #ffdab9;
    border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.22);
    padding: 14px 18px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 30;
    max-width: 260px;
    text-align: center;
  }
  .fish-prompt.show {
    display: flex;
  }
  .fish-prompt-text {
    font-size: 14px;
    color: #333;
    font-family: sans-serif;
    line-height: 1.4;
  }
  .fish-prompt-buttons {
    display: flex;
    gap: 8px;
  }
  .fish-btn {
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: sans-serif;
    font-weight: 600;
    cursor: pointer;
  }
  .fish-btn-secondary {
    background: #ffe8d6;
    color: #7a4a25;
  }
  .fish-btn-secondary:hover {
    background: #ffdcc0;
  }
  .fish-btn-primary {
    background: #f4a261;
    color: #fff;
  }
  .fish-btn-primary:hover {
    background: #e8934a;
  }

  .click-menu {
    position: absolute;
    bottom: 16%;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    padding: 8px;
    display: none;
    flex-direction: row;
    gap: 4px;
    transform: translateX(-50%);
    z-index: 20;
  }
  .click-menu.show { display: flex; }
  .menu-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 11px;
    color: #555;
    font-family: sans-serif;
  }
  .menu-btn:hover {
    background: #f2f2f2;
  }

  .bobber {
    width: 100%;
    height: 100%;
    animation: bob 0.5s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .bobber.eating {
    animation: eat 0.5s ease-in-out infinite;
  }

  @keyframes eat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(10px); }
  }

  .chew-mouth {
    transform-box: fill-box;
    transform-origin: center;
    opacity: 0;
  }
  .cat-svg.eating .closed-mouth {
    opacity: 0;
  }
  .cat-svg.eating .chew-mouth {
    opacity: 1;
    animation: chew 0.35s ease-in-out infinite;
  }
  @keyframes chew {
    0%, 100% { transform: scaleY(0.2); }
    50%      { transform: scaleY(1); }
  }

  .bobber.scratching {
    animation: scratch 0.3s ease-in-out infinite;
  }
  @keyframes scratch {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    25%      { transform: translateX(7px) rotate(-3deg); }
    50%      { transform: translateX(0) rotate(0deg); }
    75%      { transform: translateX(-3px) rotate(2deg); }
  }

  .bobber.playing {
    animation: play 0.45s ease-in-out infinite;
  }
  @keyframes play {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    30%      { transform: translate(6px, -10px) rotate(-5deg); }
    60%      { transform: translate(-5px, 0) rotate(4deg); }
  }

  .yarn.active {
    animation: yarnWobble 0.4s ease-in-out infinite;
  }
  @keyframes yarnWobble {
    0%, 100% { transform: translateX(-50%) rotate(0deg); }
    25%      { transform: translateX(-50%) rotate(18deg) translateY(-3px); }
    50%      { transform: translateX(-50%) rotate(-12deg); }
    75%      { transform: translateX(-50%) rotate(10deg) translateY(3px); }
  }

  .cat-svg { width: 100%; height: 100%; display: block; }

  #frontFace { display: none; }
  .cat-svg.greeting #upperBody,
  .cat-svg.greeting #backFarLeg,
  .cat-svg.greeting #backNearLeg {
    display: none;
  }
  .cat-svg.greeting #frontFace {
    display: block;
  }

  .eye {
    transform-box: fill-box;
    transform-origin: center;
    animation: blink 4.5s infinite;
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    93% { transform: scaleY(0.1); }
    96% { transform: scaleY(1); }
  }

  .walker { cursor: pointer; }

  .speech-bubble {
    position: absolute;
    background: #fff;
    color: #333;
    padding: 8px 14px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    opacity: 0;
    transform: translate(-50%, -100%);
    transition: opacity 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }
  .speech-bubble::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #fff;
  }
  .speech-bubble.show {
    opacity: 1;
  }

  .sky-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 75%;
    overflow: hidden;
    pointer-events: none;
  }

  /* trees scroll past behind the ground/props as he walks, at a slower rate
     than the foreground for a bit of parallax depth */
  .tree-layer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
  }
  .tree {
    position: absolute;
    bottom: 13%;
    transform: translateX(-50%);
  }

  .critter {
    position: absolute;
    left: -10%;
    z-index: 2;
    animation: fly-across 8s linear forwards;
  }
  .critter.reverse {
    animation-name: fly-across-reverse;
    transform: scaleX(-1);
  }

  @keyframes fly-across {
    from { left: -10%; }
    to   { left: 110%; }
  }
  @keyframes fly-across-reverse {
    from { left: 110%; }
    to   { left: -10%; }
  }

  .cloud {
    position: absolute;
    z-index: 1;
    opacity: 0.6;
    filter: blur(1px);
    animation: cloud-drift linear forwards;
    /* the sky layer disables pointer-events for the whole layer so
       butterflies aren't clickable; re-enable just for clouds so they can
       be clicked to trigger rain */
    pointer-events: auto;
    cursor: pointer;
  }
  .cloud.reverse {
    animation-name: cloud-drift-reverse;
  }
  @keyframes cloud-drift {
    from { left: -20%; }
    to   { left: 120%; }
  }
  @keyframes cloud-drift-reverse {
    from { left: 120%; }
    to   { left: -20%; }
  }

  .wing-flap {
    transform-box: fill-box;
    transform-origin: center;
    animation: flap 0.3s ease-in-out infinite;
  }
  @keyframes flap {
    0%, 100% { transform: scaleX(1); }
    50%      { transform: scaleX(0.6); }
  }

  /* ---- weather: rain triggered by clicking a cloud ---- */
  .weather-overlay {
    position: absolute;
    inset: 0;
    background: rgba(40, 55, 80, 0.4);
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    z-index: 4;
  }
  .weather-overlay.show {
    opacity: 1;
  }

  .rain-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 5;
  }

  .raindrop {
    position: absolute;
    top: -20px;
    width: 2px;
    height: 16px;
    border-radius: 1px;
    background: linear-gradient(to bottom, rgba(150, 190, 255, 0), rgba(150, 190, 255, 0.75));
    animation: rain-fall linear forwards;
  }
  @keyframes rain-fall {
    to { transform: translateY(110vh); }
  }

  /* umbrella: only visible while it's raining, and hidden again during the
     front-facing greet pose so it doesn't overlap oddly */
  #umbrella { display: none; }
  .cat-svg.raining #umbrella { display: block; }
  .cat-svg.greeting #umbrella { display: none; }

  .rainboot { display: none; }
  .cat-svg.raining .rainboot { display: block; }

  /* ---- bird that lands on the grass every so often ---- */
  .bird {
    position: absolute;
    bottom: 13%;
    transform: translateX(-50%);
    z-index: 3;
    display: none;
    transform-origin: center bottom;
  }
  .bird.bird-landing {
    animation: bird-flutter-down 1.1s ease-out forwards;
  }
  .bird.bird-leaving {
    animation: bird-fly-away 3.6s ease-in forwards;
  }
  /* wings flap fast while airborne, then fold still once perched */
  .bird .wing-flap {
    animation: none;
  }
  .bird.bird-landing .wing-flap,
  .bird.bird-leaving .wing-flap {
    animation: flap 0.14s ease-in-out infinite;
  }
  @keyframes bird-flutter-down {
    0%   { transform: translateX(-50%) translate(0, -160px) rotate(-8deg); opacity: 0.4; }
    22%  { transform: translateX(-50%) translate(-14px, -115px) rotate(6deg); opacity: 0.7; }
    44%  { transform: translateX(-50%) translate(10px, -75px) rotate(-7deg); opacity: 0.9; }
    64%  { transform: translateX(-50%) translate(-8px, -40px) rotate(5deg); opacity: 1; }
    80%  { transform: translateX(-50%) translate(4px, -16px) rotate(-3deg); }
    92%  { transform: translateX(-50%) translate(-2px, -3px) rotate(1deg); }
    100% { transform: translateX(-50%) translate(0, 0) rotate(0deg); opacity: 1; }
  }
  @keyframes bird-fly-away {
    0%   { transform: translateX(-50%) translate(0, 0) rotate(0deg); opacity: 1; }
    30%  { transform: translateX(-50%) translate(30px, -40vh) rotate(10deg); opacity: 1; }
    100% { transform: translateX(-50%) translate(90px, -130vh) rotate(18deg); opacity: 1; }
  }

  /* freeze the walking bounce entirely while Ollie is startled */
  .bobber.frozen {
    animation: none;
  }

  /* surprised reaction when Ollie notices the bird: big eyes, mouth wide open */
  .cat-svg.surprised .eye {
    animation: none;
    transform: scale(1.7);
  }
  .surprise-mouth {
    opacity: 0;
  }
  .cat-svg.surprised .closed-mouth {
    opacity: 0;
  }
  .cat-svg.surprised .chew-mouth {
    opacity: 0;
  }
  .cat-svg.surprised .surprise-mouth {
    opacity: 1;
  }

  /* ---- fishing scene: a separate full-screen view he's taken to from the sign.
     Same setup as the main walk (sky filling most of the screen, a strip
     along the bottom) — the strip is just split into a little grass on the
     left and a pond taking up the rest, instead of solid ground. ---- */
  .fishing-scene {
    position: fixed;
    inset: 0;
    display: none;
    z-index: 200;
    background: linear-gradient(to bottom, #cfe9ff 0%, #eef8ff 55%, #d8ecc9 100%);
  }
  .fishing-scene.show {
    display: block;
  }
  .fishing-ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 14%;
    overflow: hidden;
    box-shadow: 0 -3px 0 rgba(0, 0, 0, 0.06);
    background: linear-gradient(to right,
      #cfe2b8 0%,
      #cfe2b8 24%,
      #6bb2dd 48%,
      #3f7dbf 100%);
  }
  .fishing-water-ripples {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 58%;
    overflow: hidden;
  }
  .ripple {
    position: absolute;
    width: 26px;
    height: 26px;
    border: 2px solid rgba(255, 255, 255, 0.65);
    border-radius: 50%;
    /* flattened into a low ellipse so it reads as lying flat on the water's
       surface instead of a circle floating above it */
    transform: translate(-50%, -50%) scaleY(0.35) scale(0.2);
    opacity: 0.75;
    animation: ripple-expand 2.4s ease-out forwards;
    pointer-events: none;
  }
  @keyframes ripple-expand {
    0%   { transform: translate(-50%, -50%) scaleY(0.35) scale(0.2); opacity: 0.7; }
    100% { transform: translate(-50%, -50%) scaleY(0.35) scale(2.6); opacity: 0; }
  }
  .fishing-fish-layer {
    position: absolute;
    right: 0;
    bottom: 14%; /* sits right at the pond's surface line */
    width: 58%;
    height: 160px;
    overflow: visible;
    z-index: 2;
    pointer-events: none;
  }
  .leaping-fish {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 34px;
    height: 20px;
    transform: translate(-50%, 0);
    animation: fish-leap 1.2s linear forwards;
  }
  .leaping-fish svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .leaping-fish.leap-b {
    animation-name: fish-leap-rev;
  }
  @keyframes fish-leap {
    /* points sampled off a real parabola (y = -4H*p*(1-p)) so the path itself
       is a smooth rounded curve, like the umbrella dome, instead of two
       straight segments meeting at a sharp peak. even time-steps along this
       curve also naturally go fast off the water and slow at the top. */
    0%   { transform: translate(calc(-50% + 0px), 0px) scale(0.50) rotate(-15deg); opacity: 0; }
    10%  { transform: translate(calc(-50% + 16px), -36px) scale(0.65) rotate(-11.5deg); opacity: 0.8; }
    15%  { opacity: 1; }
    20%  { transform: translate(calc(-50% + 32px), -64px) scale(0.79) rotate(-8deg); opacity: 1; }
    30%  { transform: translate(calc(-50% + 48px), -84px) scale(0.90) rotate(-4.5deg); opacity: 1; }
    40%  { transform: translate(calc(-50% + 64px), -96px) scale(0.98) rotate(-1deg); opacity: 1; }
    50%  { transform: translate(calc(-50% + 80px), -100px) scale(1.00) rotate(2.5deg); opacity: 1; }
    60%  { transform: translate(calc(-50% + 96px), -96px) scale(0.98) rotate(6deg); opacity: 1; }
    70%  { transform: translate(calc(-50% + 112px), -84px) scale(0.90) rotate(9.5deg); opacity: 1; }
    80%  { transform: translate(calc(-50% + 128px), -64px) scale(0.79) rotate(13deg); opacity: 1; }
    85%  { opacity: 1; }
    90%  { transform: translate(calc(-50% + 144px), -36px) scale(0.65) rotate(16.5deg); opacity: 0.8; }
    100% { transform: translate(calc(-50% + 160px), 0px) scale(0.50) rotate(20deg); opacity: 0; }
  }
  @keyframes fish-leap-rev {
    0%   { transform: translate(calc(-50% - 0px), 0px) scale(0.50) rotate(15deg); opacity: 0; }
    10%  { transform: translate(calc(-50% - 16px), -36px) scale(0.65) rotate(11.5deg); opacity: 0.8; }
    15%  { opacity: 1; }
    20%  { transform: translate(calc(-50% - 32px), -64px) scale(0.79) rotate(8deg); opacity: 1; }
    30%  { transform: translate(calc(-50% - 48px), -84px) scale(0.90) rotate(4.5deg); opacity: 1; }
    40%  { transform: translate(calc(-50% - 64px), -96px) scale(0.98) rotate(1deg); opacity: 1; }
    50%  { transform: translate(calc(-50% - 80px), -100px) scale(1.00) rotate(-2.5deg); opacity: 1; }
    60%  { transform: translate(calc(-50% - 96px), -96px) scale(0.98) rotate(-6deg); opacity: 1; }
    70%  { transform: translate(calc(-50% - 112px), -84px) scale(0.90) rotate(-9.5deg); opacity: 1; }
    80%  { transform: translate(calc(-50% - 128px), -64px) scale(0.79) rotate(-13deg); opacity: 1; }
    85%  { opacity: 1; }
    90%  { transform: translate(calc(-50% - 144px), -36px) scale(0.65) rotate(-16.5deg); opacity: 0.8; }
    100% { transform: translate(calc(-50% - 160px), 0px) scale(0.50) rotate(-20deg); opacity: 0; }
  }
  .fishing-ollie {
    position: absolute;
    left: 2%;
    bottom: 14%; /* his feet (viewBox y=400) land exactly on the ground line */
    width: 180px;
    height: 240px;
    z-index: 1;
  }
  .fishing-ollie svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible; /* lets the rod/line extend out over the pond */
  }
  /* pulses while a fish is actively pulling, as a "click me!" cue */
  @keyframes bobber-bite-pulse {
    0%, 100% { filter: drop-shadow(0 0 0 rgba(224, 122, 158, 0)); }
    50%      { filter: drop-shadow(0 0 7px rgba(224, 122, 158, 0.95)); }
  }
  #fishingBobber.bite-active {
    animation: bobber-bite-pulse 0.55s ease-in-out infinite;
  }
  .fishing-catch-msg {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: #fff4e0;
    border: 3px solid #231a14;
    border-radius: 14px;
    padding: 10px 22px;
    font-family: sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #5c3a1a;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 220;
    white-space: nowrap;
  }
  .fishing-catch-msg.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .fishing-back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 210;
    background: #fff;
    border: none;
    border-radius: 10px;
    padding: 9px 16px;
    font-size: 13px;
    font-family: sans-serif;
    font-weight: 600;
    color: #444;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
  }
  .fishing-back-btn:hover {
    background: #f2f2f2;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="sky-layer" id="skyLayer"></div>
  <div class="tree-layer" id="treeLayer"></div>
  <div class="caption">Ollie Sharp is on a walk 🐾</div>
  <div class="instructions">Click Ollie to say hi 👋 &nbsp;·&nbsp; Click the grass to give him food, a toy, or a scratching post 🐟🧶🐾</div>
  <div class="ground"></div>

  <div class="walker">
    <div class="bobber">
      <svg class="cat-svg" viewBox="-60 -110 520 445" xmlns="http://www.w3.org/2000/svg">

        <defs>
          <filter id="soften" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6"/>
          </filter>
        </defs>

        <!-- ground shadow -->
        <ellipse cx="220" cy="308" rx="150" ry="8" fill="#000" opacity="0.10"/>

        <!-- back-far leg: stays planted on the ground even when the upper body rears up -->
        <g id="backFarLeg">
          <animateTransform attributeName="transform" type="rotate"
            values="-16 115 250; 16 115 250; -16 115 250" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 115 250 C 112 268, 110 285, 113 300" stroke="#231a14" stroke-width="26" fill="none" stroke-linecap="round"/>
          <path d="M 115 250 C 112 268, 110 285, 113 300" stroke="#d97f3d" stroke-width="18" fill="none" stroke-linecap="round"/>
          <!-- yellow rain boot, shown only while it's raining -->
          <g class="rainboot">
            <path d="M 103 282 L 103 298 C 98 303, 97 310, 102 315 C 107 319, 119 319, 124 315 C 129 310, 128 303, 123 298 L 123 282 Z"
                  fill="#ffce30" stroke="#231a14" stroke-width="4" stroke-linejoin="round"/>
            <path d="M 102 315 Q 113 322 124 315" stroke="#c98f1f" stroke-width="3" fill="none" stroke-linecap="round"/>
            <ellipse cx="118" cy="308" rx="2.5" ry="5" fill="#fff6d9" opacity="0.55"/>
          </g>
        </g>
        <!-- back-near leg: stays planted on the ground even when the upper body rears up -->
        <g id="backNearLeg">
          <animateTransform attributeName="transform" type="rotate"
            values="16 108 250; -16 108 250; 16 108 250" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 108 250 C 111 268, 113 285, 110 300" stroke="#231a14" stroke-width="26" fill="none" stroke-linecap="round"/>
          <path d="M 108 250 C 111 268, 113 285, 110 300" stroke="#e8944e" stroke-width="18" fill="none" stroke-linecap="round"/>
          <ellipse cx="110" cy="302" rx="15" ry="8" fill="#fbe9c9" stroke="#231a14" stroke-width="4"/>
          <!-- yellow rain boot, shown only while it's raining -->
          <g class="rainboot">
            <path d="M 100 282 L 100 298 C 95 303, 94 310, 99 315 C 104 319, 116 319, 121 315 C 126 310, 125 303, 120 298 L 120 282 Z"
                  fill="#ffce30" stroke="#231a14" stroke-width="4" stroke-linejoin="round"/>
            <path d="M 99 315 Q 110 322 121 315" stroke="#c98f1f" stroke-width="3" fill="none" stroke-linecap="round"/>
            <ellipse cx="115" cy="308" rx="2.5" ry="5" fill="#fff6d9" opacity="0.55"/>
          </g>
        </g>

        <!-- everything from the hips up: tail, body, front legs, head. When scratching,
             this whole group rotates back around the hind-leg pivot so the cat looks
             like it's rearing up, while the two back legs above stay planted. -->
        <g id="upperBody">

          <!-- tail -->
          <g>
            <animateTransform attributeName="transform" type="rotate"
              values="8 90 210; -6 90 210; 8 90 210" dur="0.5s" repeatCount="indefinite"/>
            <path d="M 90 210 C 55 200, 30 165, 45 130 C 55 105, 80 100, 85 120 C 88 135, 70 138, 62 125"
                  fill="none" stroke="#231a14" stroke-width="20" stroke-linecap="round"/>

        <!-- fishing boots -->
        <path d="M 185 290 L 185 306 C 181 310, 180 316, 185 320 C 189 323, 201 323, 205 320 C 210 316, 209 310, 205 306 L 205 290 Z"
              fill="#6b7f4e" stroke="#231a14" stroke-width="4" stroke-linejoin="round"/>
        <path d="M 255 290 L 255 306 C 251 310, 250 316, 255 320 C 259 323, 271 323, 275 320 C 280 316, 279 310, 275 306 L 275 290 Z"
              fill="#6b7f4e" stroke="#231a14" stroke-width="4" stroke-linejoin="round"/>

        <!-- fishing hat, scaled up around its brim center so it grows
             without drifting off the top of his head -->
        <g transform="translate(196 -49) translate(34 21) scale(1.35) translate(-34 -21)">
          <path d="M 6 20 Q 10 2 34 2 Q 58 2 62 20 Z" fill="#8a5a2b" stroke="#231a14" stroke-width="3" stroke-linejoin="round"/>
          <ellipse cx="34" cy="21" rx="34" ry="6" fill="#a9702f" stroke="#231a14" stroke-width="3"/>
          <path d="M 46 10 L 58 6" stroke="#e07a9e" stroke-width="2"/>
          <circle cx="59" cy="5" r="2" fill="#e8c547" stroke="#231a14" stroke-width="1"/>
        </g>
      </g>
    </svg>
  </div>

  <button class="fishing-back-btn" id="fishingBackBtn" type="button">← Back to walk</button>
  <div class="fishing-catch-msg" id="fishingCatchMsg"></div>
</div>

<script>
  const walker = document.querySelector('.walker');
  const stage = document.querySelector('.stage');
  const ground = document.querySelector('.ground');
  const bubble = document.getElementById('speechBubble');
  const bowl = document.getElementById('bowl');
  const post = document.getElementById('post');
  const yarn = document.getElementById('yarn');
  const sign = document.getElementById('sign');
  const fishPrompt = document.getElementById('fishPrompt');
  const menu = document.getElementById('clickMenu');
  const props = { food: bowl, post: post, toy: yarn, sign: sign };

  // ---- speech bubble ----
  let hideTimeout;
  let bubbleAnimFrame;

  function updateBubblePosition() {
    const walkerRect = walker.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const x = walkerRect.left - stageRect.left + walkerRect.width / 2;
    const y = walkerRect.top - stageRect.top;

    bubble.style.left = x + 'px';
    bubble.style.top = y + 'px';

    bubbleAnimFrame = requestAnimationFrame(updateBubblePosition);
  }

  walker.addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.remove('show');
    bubble.classList.add('show');
    cancelAnimationFrame(bubbleAnimFrame);
    updateBubblePosition();

    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
      bubble.classList.remove('show');
      cancelAnimationFrame(bubbleAnimFrame);
    }, 2250);

    // stand up facing forward and wave while greeting, as long as he's not
    // already busy eating/scratching/playing somewhere
    if (state === 'patrol') {
      state = 'interacting';
      targetType = 'greet';
      catSvg.pauseAnimations();
      catSvg.classList.add('greeting');
      clearTimeout(actionTimeout);
      actionTimeout = setTimeout(() => {
        catSvg.classList.remove('greeting');
        frontFaceWavePaw.removeAttribute('transform');
        catSvg.unpauseAnimations();
        state = 'patrol';
      }, 2250);
    }
  });

  // ---- walking / bowl / eating ----
  // The svg's viewBox has extra margin on the top/left (-60 -70 520 390 instead
  // of 0 0 460 320) so the rearing-up pose below has room to breathe without
  // the head/tail getting clipped by the edge of the SVG. The .walker box was
  // scaled up to 294x226 to match, so the cat still renders at the same size.
  const CAT_WIDTH = 294;
  const VIEWBOX_X = -60;
  const VIEWBOX_WIDTH = 520;

  const bobber = document.querySelector('.bobber');
  const catSvg = document.querySelector('.cat-svg');
  const upperBody = document.getElementById('upperBody');
  const frontNearLeg = document.getElementById('frontNearLeg');
  const frontFarLeg = document.getElementById('frontFarLeg');
  const frontFaceWavePaw = document.getElementById('frontFaceWavePaw');
  const FRONT_FACE_WAVE_PIVOT = { x: 285, y: 145 };

  // pivot for rearing up on the hind legs — this is exactly where the (separate,
  // stationary) back legs are rooted, so the rotation must stay centered right
  // on top of them rather than being shifted, or the body visually detaches
  // from the legs and they end up hidden behind it.
  const REAR_PIVOT = { x: 112, y: 250 };
  const REAR_ANGLE = -42;
  const FRONT_NEAR_PIVOT = { x: 258, y: 250 };
  const FRONT_FAR_PIVOT = { x: 250, y: 250 };

  // Ollie now always faces right and never turns around — he stays put at a
  // fixed spot on screen (see .walker's CSS "left") and the ground/props/bird
  // scroll past him instead, like a camera following him on a long walk.
  // "scrollOffset" is the total distance he's "walked" so far; anything placed
  // in the world (props, the bird) has a fixed worldX, and its on-screen
  // position is simply worldX - scrollOffset, which drifts left as he goes.
  const NOSE_X_IN_VIEWBOX = 346;
  const NOSE_OFFSET = ((NOSE_X_IN_VIEWBOX - VIEWBOX_X) / VIEWBOX_WIDTH) * CAT_WIDTH;
  const OLLIE_LEFT_FRACTION = 0.16; // must match .walker's CSS "left"

  function screenXFor(worldX) {
    return worldX - scrollOffset;
  }

  let scrollOffset = 0;
  let state = 'patrol'; // 'patrol' | 'toTarget' | 'interacting'
  let targetWorldX = null;
  let targetType = null; // 'food' | 'post' | 'toy' | 'greet' | 'bird'
  let pendingClickX = null;
  let lastTime = null;
  let actionTimeout;
  let minPx = 0; // leftmost click position (right at Ollie's nose)
  let maxPx = 0; // rightmost click position (near the edge of the screen)
  let noseScreenX = 0;

  // ---- bird that lands on the grass every so often ----
  const bird = document.getElementById('bird');
  const BIRD_INTERVAL = 15000;
  const BIRD_FLUTTER_DURATION = 1100;
  const BIRD_STAY_DURATION = 4500;
  const BIRD_LEAVE_ANIM_DURATION = 3600;
  const REACTION_DURATION = 2200;
  const BIRD_NOTICE_DISTANCE = 130; // px from his nose before he notices it
  let birdActive = false;
  let birdNoticed = false;
  let birdWorldX = null;
  let birdLeaveTimeout = null;

  function spawnBird() {
    if (birdActive) return; // don't overlap birds
    birdActive = true;
    birdNoticed = false;

    const stageWidth = stage.getBoundingClientRect().width;
    birdWorldX = scrollOffset + noseScreenX + stageWidth * (0.2 + Math.random() * 0.55);
    bird.style.left = screenXFor(birdWorldX) + 'px';
    bird.style.display = 'block';
    bird.classList.remove('bird-leaving');
    // reflow so the landing animation restarts cleanly if re-triggered
    void bird.offsetWidth;
    bird.classList.add('bird-landing');

    // once he's touched down, fold the wings back in (stop the fast flap)
    setTimeout(() => {
      bird.classList.remove('bird-landing');
    }, BIRD_FLUTTER_DURATION);

    birdLeaveTimeout = setTimeout(() => {
      bird.classList.add('bird-leaving');
      setTimeout(() => {
        bird.style.display = 'none';
        bird.classList.remove('bird-leaving');
        birdActive = false;
        birdWorldX = null;
      }, BIRD_LEAVE_ANIM_DURATION);
    }, BIRD_STAY_DURATION);
  }

  function reactToBird() {
    birdNoticed = true;
    state = 'interacting';
    targetType = 'bird';
    catSvg.pauseAnimations();
    bobber.classList.add('frozen');
    catSvg.classList.add('surprised');
    clearTimeout(actionTimeout);
    actionTimeout = setTimeout(() => {
      bobber.classList.remove('frozen');
      catSvg.classList.remove('surprised');
      catSvg.unpauseAnimations();
      state = 'patrol';
    }, REACTION_DURATION);
  }

  // first bird a little after load, then every 15s after that
  setTimeout(spawnBird, 5000);
  setInterval(spawnBird, BIRD_INTERVAL);

  // ---- "go fishing" sign, every 20s ----
  const SIGN_INTERVAL = 20000;
  const fishingScene = document.getElementById('fishingScene');

  function spawnSign() {
    if (state !== 'patrol') return; // he's busy — the next 20s cycle will try again

    const stageWidth = stage.getBoundingClientRect().width;
    targetWorldX = scrollOffset + noseScreenX + stageWidth * 0.55;
    sign.style.left = screenXFor(targetWorldX) + 'px';
    sign.style.display = 'block';

    targetType = 'sign';
    state = 'toTarget';

    bobber.classList.remove('eating', 'scratching', 'playing', 'frozen');
    catSvg.classList.remove('eating', 'greeting', 'surprised');
    frontFaceWavePaw.removeAttribute('transform');
    catSvg.unpauseAnimations();
  }

  setInterval(spawnSign, SIGN_INTERVAL);

  document.getElementById('btnKeepWalking').addEventListener('click', (e) => {
    e.stopPropagation();
    clearAllProps();
    catSvg.unpauseAnimations();
    state = 'patrol';
  });

  // takes him to a separate fishing scene — just the land/pond scenery for
  // now, the actual fishing interaction comes later
  document.getElementById('btnGoFish').addEventListener('click', (e) => {
    e.stopPropagation();
    fishPrompt.classList.remove('show');
    sign.style.display = 'none';
    fishingScene.classList.add('show');
  });

  document.getElementById('fishingBackBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    fishingScene.classList.remove('show');
    clearAllProps();
    catSvg.unpauseAnimations();
    state = 'patrol';
  });

  // ---- gentle animated ripples across the pond ----
  const waterRipples = document.getElementById('waterRipples');

  function spawnRipple() {
    if (!fishingScene.classList.contains('show')) return;
    const el = document.createElement('div');
    el.className = 'ripple';
    el.style.left = (5 + Math.random() * 90) + '%';
    el.style.top = (15 + Math.random() * 70) + '%';
    el.addEventListener('animationend', () => el.remove());
    waterRipples.appendChild(el);
  }

  setInterval(spawnRipple, 850);

  // ---- fish leaping out of the pond ----
  const fishLayer = document.getElementById('fishLayer');

  function spawnSplash(xPercent) {
    const el = document.createElement('div');
    el.className = 'ripple';
    el.style.left = xPercent + '%';
    el.style.top = (82 + Math.random() * 12) + '%';
    el.addEventListener('animationend', () => el.remove());
    waterRipples.appendChild(el);
  }

  const FISH_SVG = '<svg viewBox="-8 0 52 24">' +
    '<path d="M 8 12 L -6 4 L -6 20 Z" fill="#4f8fb8" stroke="#231a14" stroke-width="2" stroke-linejoin="round"/>' +
    '<ellipse cx="24" cy="12" rx="14" ry="8" fill="#8fc7e8" stroke="#231a14" stroke-width="2"/>' +
    '<path d="M 20 6 L 24 -2 L 28 6 Z" fill="#4f8fb8" stroke="#231a14" stroke-width="2" stroke-linejoin="round"/>' +
    '<circle cx="32" cy="9" r="2" fill="#231a14"/>' +
    '</svg>';

  // alternate leap direction on every spawn (instead of a coin flip) so
  // fish reliably jump both left and right, not just whichever way luck
  // happens to favor in a given stretch
  let nextLeapIsB = Math.random() < 0.5;

  function spawnFish() {
    if (!fishingScene.classList.contains('show')) return;
    const xPercent = 15 + Math.random() * 55;
    const leapB = nextLeapIsB;
    nextLeapIsB = !nextLeapIsB;
    const el = document.createElement('div');
    el.className = 'leaping-fish' + (leapB ? ' leap-b' : '');
    el.style.left = xPercent + '%';
    // face the fish the way it's actually leaping — the outer element's
    // transform is owned by the jump animation, so the flip lives on a
    // static inner wrapper instead of conflicting with it
    el.innerHTML = leapB
      ? '<div style="width:100%;height:100%;transform:scaleX(-1)">' + FISH_SVG + '</div>'
      : FISH_SVG;
    el.addEventListener('animationend', () => el.remove());
    fishLayer.appendChild(el);

    // the fish drifts sideways over the arc (160px, matching the keyframes),
    // so the landing splash needs to track where it actually comes back down
    const layerWidth = fishLayer.offsetWidth || 300;
    const driftPercent = (160 / layerWidth) * 100 * (leapB ? -1 : 1);
    const landPercent = Math.min(98, Math.max(2, xPercent + driftPercent));

    spawnSplash(xPercent);
    setTimeout(() => spawnSplash(landPercent), 1050);
  }

  setInterval(spawnFish, 2600 + Math.random() * 1800);

  // ---- a fish tugging on Ollie's line every so often, escalating the
  // longer you wait to click the bobber ----
  const fishingForearmOutlineTug = document.getElementById('fishingForearmOutlineTug');
  const fishingForearmTug = document.getElementById('fishingForearmTug');
  const fishingPawTug = document.getElementById('fishingPawTug');
  const fishingPawTugY = document.getElementById('fishingPawTugY');
  const fishingRodTug = document.getElementById('fishingRodTug');
  const fishingLineTug = document.getElementById('fishingLineTug');
  const fishingBobberTugX = document.getElementById('fishingBobberTugX');
  const fishingBobberTugY = document.getElementById('fishingBobberTugY');
  const fishingBobberHitTugX = document.getElementById('fishingBobberHitTugX');
  const fishingBobberHitTugY = document.getElementById('fishingBobberHitTugY');
  const fishingBobber = document.getElementById('fishingBobber');
  const fishingBobberHit = document.getElementById('fishingBobberHit');
  const fishingCatchMsg = document.getElementById('fishingCatchMsg');

  const BITE_TUG_DURATION = 1800; // ms, matches each animate's dur="1.8s"
  const BITE_ESCALATE_STEP = 0.5;
  const BITE_MAX_MULTIPLIER = 3;

  let biteActive = false;
  let biteMultiplier = 1;
  let biteEscalateTimer = null;
  let catchMsgTimeout = null;

  // base offsets (at multiplier 1) for each of the 5 tug keyframes, sampled
  // by hand earlier — bigger multiplier just stretches these further
  const ARM_DX = [0, 9, -3, 5, 0];
  const ARM_DY = [0, 6, -2, 3, 0];
  const BOB_DX = [0, 51, -19, 30, 0];
  const BOB_DY = [0, 32, -12, 19, 0];

  function computeTugValues(m) {
    const ax = ARM_DX.map(d => Math.round(d * m));
    const ay = ARM_DY.map(d => Math.round(d * m));
    const bx = BOB_DX.map(d => Math.round(d * m));
    const by = BOB_DY.map(d => Math.round(d * m));
    const forearm = ax.map((dx, i) => `M 285 145 C 305 130, ${322 + dx} ${107 + ay[i]}, ${330 + dx} ${79 + ay[i]}`).join(';');
    const pawCx = ax.map(dx => 332 + dx).join(';');
    const pawCy = ay.map(dy => 76 + dy).join(';');
    const rod = ax.map((dx, i) => `M ${332 + dx} ${76 + ay[i]} L ${392 + dx} ${4 + ay[i]}`).join(';');
    const line = ax.map((dx, i) => `M ${392 + dx} ${4 + ay[i]} L ${930 + bx[i]} ${345 + by[i]}`).join(';');
    const bobberCx = bx.map(dx => 930 + dx).join(';');
    const bobberCy = by.map(dy => 345 + dy).join(';');
    return { forearm, pawCx, pawCy, rod, line, bobberCx, bobberCy };
  }

  function applyTug(m) {
    const v = computeTugValues(m);
    fishingForearmOutlineTug.setAttribute('values', v.forearm);
    fishingForearmTug.setAttribute('values', v.forearm);
    fishingPawTug.setAttribute('values', v.pawCx);
    fishingPawTugY.setAttribute('values', v.pawCy);
    fishingRodTug.setAttribute('values', v.rod);
    fishingLineTug.setAttribute('values', v.line);
    fishingBobberTugX.setAttribute('values', v.bobberCx);
    fishingBobberTugY.setAttribute('values', v.bobberCy);
    fishingBobberHitTugX.setAttribute('values', v.bobberCx);
    fishingBobberHitTugY.setAttribute('values', v.bobberCy);
    [fishingForearmOutlineTug, fishingForearmTug, fishingPawTug, fishingPawTugY,
     fishingRodTug, fishingLineTug, fishingBobberTugX, fishingBobberTugY,
     fishingBobberHitTugX, fishingBobberHitTugY].forEach(anim => anim.beginElement());
  }

  function showCatchMessage(text) {
    fishingCatchMsg.textContent = text;
    fishingCatchMsg.classList.add('show');
    clearTimeout(catchMsgTimeout);
    catchMsgTimeout = setTimeout(() => fishingCatchMsg.classList.remove('show'), 1800);
  }

  function endBite(caught) {
    biteActive = false;
    clearInterval(biteEscalateTimer);
    fishingBobber.classList.remove('bite-active');
    showCatchMessage(caught ? 'Got one! 🐟' : 'It got away...');
  }

  function startBite() {
    if (!fishingScene.classList.contains('show') || biteActive) return;
    biteActive = true;
    biteMultiplier = 1;
    fishingBobber.classList.add('bite-active');
    applyTug(biteMultiplier);
    biteEscalateTimer = setInterval(() => {
      biteMultiplier = Math.min(BITE_MAX_MULTIPLIER, biteMultiplier + BITE_ESCALATE_STEP);
      applyTug(biteMultiplier);
      if (biteMultiplier >= BITE_MAX_MULTIPLIER) {
        setTimeout(() => { if (biteActive) endBite(false); }, BITE_TUG_DURATION);
      }
    }, BITE_TUG_DURATION);
  }

  fishingBobberHit.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!biteActive) return;
    endBite(true);
  });

  setInterval(startBite, 6000 + Math.random() * 4000);

  const ACTION_DURATION = { food: 3000, post: 2800, toy: 3500 };
  const ARRIVAL_GAP = { sign: 130 }; // how far short of the prop he stops, in px

  function recalcBounds() {
    const stageWidth = stage.getBoundingClientRect().width;
    const ollieLeftPx = stageWidth * OLLIE_LEFT_FRACTION;
    noseScreenX = ollieLeftPx + NOSE_OFFSET;
    minPx = noseScreenX;
    maxPx = stageWidth * 0.92;
  }
  recalcBounds();
  window.addEventListener('resize', recalcBounds);

  const SPEED_PX = 90; // pixels per second

  ground.addEventListener('click', (e) => {
    e.stopPropagation();
    const stageRect = stage.getBoundingClientRect();
    const clickX = e.clientX - stageRect.left;
    pendingClickX = Math.max(minPx, Math.min(maxPx, clickX));

    menu.style.left = pendingClickX + 'px';
    menu.classList.add('show');
  });

  // clicking anywhere outside the menu (and not on the ground, which opens it) closes it
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target) && e.target !== ground) {
      menu.classList.remove('show');
    }
  });

  function clearAllProps() {
    bowl.style.display = 'none';
    post.style.display = 'none';
    yarn.style.display = 'none';
    yarn.classList.remove('active');
    sign.style.display = 'none';
    fishPrompt.classList.remove('show');
  }

  function chooseTarget(type) {
    menu.classList.remove('show');
    if (pendingClickX == null) return;

    clearAllProps();
    clearTimeout(actionTimeout);

    const propEl = props[type];
    // remember where this prop sits in the world (not just on screen) so it
    // keeps scrolling toward him at the right spot as he "walks"
    targetWorldX = pendingClickX + scrollOffset;
    propEl.style.left = screenXFor(targetWorldX) + 'px';
    propEl.style.display = 'block';

    targetType = type;
    state = 'toTarget';

    bobber.classList.remove('eating', 'scratching', 'playing', 'frozen');
    catSvg.classList.remove('eating', 'greeting', 'surprised');
    frontFaceWavePaw.removeAttribute('transform');
    catSvg.unpauseAnimations();
  }

  document.getElementById('btnFood').addEventListener('click', (e) => { e.stopPropagation(); chooseTarget('food'); });
  document.getElementById('btnPost').addEventListener('click', (e) => { e.stopPropagation(); chooseTarget('post'); });
  document.getElementById('btnToy').addEventListener('click', (e) => { e.stopPropagation(); chooseTarget('toy'); });

  function frame(timestamp) {
    if (lastTime === null) lastTime = timestamp;
    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    if (state === 'patrol') {
      scrollOffset += SPEED_PX * dt;

      // notice the bird once it's scrolled close enough ahead of him — he
      // always faces forward now, so it's proximity that matters, not which
      // way he's turned
      if (birdActive && !birdNoticed && birdWorldX != null) {
        const birdScreenX = screenXFor(birdWorldX);
        if (birdScreenX - noseScreenX <= BIRD_NOTICE_DISTANCE) {
          reactToBird();
        }
      }
    } else if (state === 'toTarget') {
      // most props he walks right up to, but a bit of breathing room in
      // front of the sign reads better than his nose touching it
      const arrivalGap = ARRIVAL_GAP[targetType] || 0;
      const stopScreenX = noseScreenX + arrivalGap;

      const propScreenX = screenXFor(targetWorldX);
      const diff = propScreenX - stopScreenX;
      const step = SPEED_PX * dt;

      if (diff <= step) {
        // snap so he stops exactly the right distance short of the prop
        scrollOffset = targetWorldX - stopScreenX;
        state = 'interacting';

        if (targetType === 'food') {
          bobber.classList.add('eating');
          catSvg.classList.add('eating');
          catSvg.pauseAnimations();
        } else if (targetType === 'post') {
          // legs/tail are frozen via pauseAnimations(); the rearing pose and
          // claw-swipe motion are driven procedurally each frame below instead
          catSvg.pauseAnimations();
        } else if (targetType === 'toy') {
          bobber.classList.add('playing');
          yarn.classList.add('active');
          catSvg.pauseAnimations();
        } else if (targetType === 'sign') {
          // he stops right at the sign and waits for a choice — no auto-timer
          catSvg.pauseAnimations();
          fishPrompt.classList.add('show');
        }

        if (targetType !== 'sign') {
          actionTimeout = setTimeout(() => {
            clearAllProps();
            bobber.classList.remove('eating', 'scratching', 'playing');
            catSvg.classList.remove('eating');
            catSvg.unpauseAnimations();
            state = 'patrol';
          }, ACTION_DURATION[targetType] || 3000);
        }
      } else {
        scrollOffset += step;
      }

      props[targetType].style.left = screenXFor(targetWorldX) + 'px';
    }

    if (state === 'interacting' && targetType === 'post') {
      // rear the side-view upper body back on the hind legs, then swipe the
      // two front legs up and down against the post like clawing
      upperBody.setAttribute('transform', 'rotate(' + REAR_ANGLE + ' ' + REAR_PIVOT.x + ' ' + REAR_PIVOT.y + ')');
      const swipe = Math.sin(timestamp / 130) * 18;
      frontNearLeg.setAttribute('transform', 'rotate(' + (-55 + swipe) + ' ' + FRONT_NEAR_PIVOT.x + ' ' + FRONT_NEAR_PIVOT.y + ')');
      frontFarLeg.setAttribute('transform', 'rotate(' + (-55 - swipe) + ' ' + FRONT_FAR_PIVOT.x + ' ' + FRONT_FAR_PIVOT.y + ')');
    } else {
      upperBody.removeAttribute('transform');
    }

    if (state === 'interacting' && targetType === 'greet') {
      // the side view is hidden (see .cat-svg.greeting CSS) and the
      // front-facing pose is shown instead — just wave its paw
      const wave = Math.sin(timestamp / 150) * 30;
      frontFaceWavePaw.setAttribute('transform',
        'rotate(' + (-20 + wave) + ' ' + FRONT_FACE_WAVE_PIVOT.x + ' ' + FRONT_FACE_WAVE_PIVOT.y + ')');
    }

    // the bird keeps drifting toward him as the world scrolls, same as any prop
    if (birdActive && birdWorldX != null) {
      bird.style.left = screenXFor(birdWorldX) + 'px';
    }

    updateTrees();

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);

  // ---- background trees, scrolling past as he walks ----
  const treeLayer = document.getElementById('treeLayer');
  const TREE_PARALLAX = 0.55; // slower than the foreground for a sense of depth
  const TREE_MIN_GAP = 40;
  const TREE_MAX_GAP = 90;
  const TREE_AHEAD_BUFFER = 400;
  const TREE_GREENS = ['#4f9650', '#5aa25c', '#458a48', '#63ac63'];
  let trees = [];
  let nextTreeWorldX = 150;

  function treeScreenX(worldX) {
    return worldX - scrollOffset * TREE_PARALLAX;
  }

  function treeSVG(scale) {
    // tall, narrow silhouette (viewBox is much taller than it is wide) so
    // scaling it up makes it reach toward the clouds without getting
    // comically fat
    const color = TREE_GREENS[Math.floor(Math.random() * TREE_GREENS.length)];
    const w = Math.round(60 * scale), h = Math.round(220 * scale);
    return `
      <svg viewBox="0 0 60 220" width="${w}" height="${h}">
        <rect x="27" y="195" width="6" height="25" fill="#7a5230"/>
        <path d="M 30 5 L 42 55 L 18 55 Z" fill="${color}"/>
        <path d="M 30 40 L 46 95 L 14 95 Z" fill="${color}"/>
        <path d="M 30 80 L 48 140 L 12 140 Z" fill="${color}"/>
        <path d="M 30 120 L 50 195 L 10 195 Z" fill="${color}"/>
      </svg>`;
  }

  function spawnTree(worldX) {
    const el = document.createElement('div');
    el.className = 'tree';
    const scale = 1.4 + Math.random() * 1.0;
    el.innerHTML = treeSVG(scale);
    treeLayer.appendChild(el);
    trees.push({ worldX, el });
  }

  function updateTrees() {
    const stageWidth = stage.getBoundingClientRect().width;
    const aheadEdge = scrollOffset * TREE_PARALLAX + stageWidth + TREE_AHEAD_BUFFER;
    while (nextTreeWorldX < aheadEdge) {
      spawnTree(nextTreeWorldX);
      nextTreeWorldX += TREE_MIN_GAP + Math.random() * (TREE_MAX_GAP - TREE_MIN_GAP);
    }

    for (let i = trees.length - 1; i >= 0; i--) {
      const t = trees[i];
      const screenX = treeScreenX(t.worldX);
      if (screenX < -150) {
        t.el.remove();
        trees.splice(i, 1);
        continue;
      }
      t.el.style.left = screenX + 'px';
    }
  }

  // ---- sky critters ----
  const skyLayer = document.getElementById('skyLayer');

  const butterflyColors = ['#e07a9e', '#f2c94c', '#4caf6e', '#2b4d7a'];

  function butterflySVG(color) {
    return `
      <svg viewBox="0 0 40 30" width="30" height="24">
        <g class="wing-flap">
          <ellipse cx="12" cy="12" rx="10" ry="7" fill="${color}"/>
          <ellipse cx="28" cy="12" rx="10" ry="7" fill="${color}"/>
        </g>
        <line x1="20" y1="6" x2="20" y2="20" stroke="#3a2418" stroke-width="2"/>
      </svg>`;
  }

  function spawnCritter() {
    const color = butterflyColors[Math.floor(Math.random() * butterflyColors.length)];
    const el = document.createElement('div');
    el.className = 'critter ' + (Math.random() < 0.5 ? 'reverse' : '');
    el.style.top = (35 + Math.random() * 30) + '%';
    el.style.animationDuration = (5 + Math.random() * 5) + 's';
    el.innerHTML = butterflySVG(color);
    el.addEventListener('animationend', () => el.remove());
    skyLayer.appendChild(el);
  }

  // seed a handful right away so the sky isn't empty on load
  for (let i = 0; i < 4; i++) {
    setTimeout(spawnCritter, i * 900);
  }
  setInterval(spawnCritter, 4000);

  // ---- soft background clouds ----
  function cloudSVG(scale) {
    const w = Math.round(120 * scale);
    const h = Math.round(60 * scale);
    return `
      <svg viewBox="0 0 120 60" width="${w}" height="${h}">
        <ellipse cx="35" cy="38" rx="30" ry="18" fill="#ffffff"/>
        <ellipse cx="60" cy="26" rx="26" ry="20" fill="#ffffff"/>
        <ellipse cx="85" cy="36" rx="28" ry="17" fill="#ffffff"/>
        <ellipse cx="55" cy="42" rx="38" ry="14" fill="#ffffff"/>
      </svg>`;
  }

  function spawnCloud() {
    const scale = 0.7 + Math.random() * 1.1;
    const duration = 28 + Math.random() * 22;
    const el = document.createElement('div');
    el.className = 'cloud ' + (Math.random() < 0.5 ? 'reverse' : '');
    el.style.top = (4 + Math.random() * 40) + '%';
    el.style.opacity = (0.4 + Math.random() * 0.35).toFixed(2);
    el.style.animationDuration = duration + 's';
    el.innerHTML = cloudSVG(scale);
    el.addEventListener('animationend', () => el.remove());
    // clicking a cloud makes it rain for a bit
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      startRain();
    });
    skyLayer.appendChild(el);
  }

  // seed a few clouds immediately so the sky isn't empty on load
  for (let i = 0; i < 3; i++) {
    setTimeout(spawnCloud, i * 1500);
  }
  setInterval(spawnCloud, 7000);

  // ---- rain + umbrella, triggered by clicking a cloud ----
  const rainLayer = document.getElementById('rainLayer');
  const weatherOverlay = document.getElementById('weatherOverlay');
  const RAIN_DURATION = 10000;
  const MAX_RAIN_LEVEL = 5;

  let rainInterval = null;
  let rainStopTimeout = null;
  let isRaining = false;
  let rainLevel = 0; // each cloud click bumps this up, making it heavier/darker

  function spawnRaindrop() {
    // heavier rain also means more drops fall per tick, not just faster ticks
    const dropsThisTick = 1 + Math.floor(rainLevel / 2);
    for (let i = 0; i < dropsThisTick; i++) {
      const drop = document.createElement('div');
      drop.className = 'raindrop';
      drop.style.left = Math.random() * 100 + '%';
      drop.style.animationDuration = (0.4 + Math.random() * 0.35) + 's';
      drop.addEventListener('animationend', () => drop.remove());
      rainLayer.appendChild(drop);
    }
  }

  function rainIntervalForLevel(level) {
    return Math.max(48 - (level - 1) * 8, 14); // faster spawn ticks = heavier rain
  }

  function overlayAlphaForLevel(level) {
    return Math.min(0.32 + (level - 1) * 0.13, 0.85); // darker scenery per level
  }

  function applyRainIntensity() {
    weatherOverlay.style.background = 'rgba(35, 48, 72, ' + overlayAlphaForLevel(rainLevel) + ')';
    clearInterval(rainInterval);
    rainInterval = setInterval(spawnRaindrop, rainIntervalForLevel(rainLevel));
  }

  function startRain() {
    // each cloud clicked makes it heavier/darker, up to a cap, and always
    // resets the 10s countdown before it clears up
    rainLevel = Math.min(rainLevel + 1, MAX_RAIN_LEVEL);
    clearTimeout(rainStopTimeout);

    if (!isRaining) {
      isRaining = true;
      weatherOverlay.classList.add('show');
      catSvg.classList.add('raining');
    }
    applyRainIntensity();
    rainStopTimeout = setTimeout(stopRain, RAIN_DURATION);
  }

  function stopRain() {
    isRaining = false;
    rainLevel = 0;
    clearInterval(rainInterval);
    weatherOverlay.classList.remove('show');
    catSvg.classList.remove('raining');
  }
</script>

</body>
</html>

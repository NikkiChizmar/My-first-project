<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Walking Cat</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(to bottom, #cfe9ff 0%, #eef8ff 55%, #d8ecc9 100%);
    font-family: sans-serif;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 14%;
    background: #cfe2b8;
    border-top: 3px solid #b7cf9e;
  }

  .caption {
    position: absolute;
    top: 24px;
    width: 100%;
    text-align: center;
    color: #555;
    font-size: 16px;
  }

  /* handles left/right movement across the stage + direction flip */
  .walker {
    position: absolute;
    bottom: 14%;
    width: 260px;
    height: 185px;
    left: 5%;
    transform-origin: center;
    animation: walk 9s linear infinite;
  }

  @keyframes walk {
    0%   { left: 4%;  transform: scaleX(1); }
    45%  { left: 68%; transform: scaleX(1); }
    50%  { left: 68%; transform: scaleX(-1); }
    95%  { left: 4%;  transform: scaleX(-1); }
    100% { left: 4%;  transform: scaleX(1); }
  }

  /* handles the up/down walking bounce, independent of the flip/translate above */
  .bobber {
    width: 100%;
    height: 100%;
    animation: bob 0.5s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .cat-svg { width: 100%; height: 100%; display: block; }

  /* blink */
  .eye {
    transform-box: fill-box;
    transform-origin: center;
    animation: blink 4.5s infinite;
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    93% { transform: scaleY(0.1); }
    96% { transform: scaleY(1); }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="caption">My cat, walking back and forth 🐾</div>
  <div class="ground"></div>

  <div class="walker">
    <div class="bobber">
      <svg class="cat-svg" viewBox="0 0 460 320" xmlns="http://www.w3.org/2000/svg">

        <!-- ground shadow -->
        <ellipse cx="230" cy="308" rx="150" ry="8" fill="#000" opacity="0.10"/>

        <!-- tail -->
        <g class="tail">
          <animateTransform attributeName="transform" type="rotate"
            values="6 95 195; -6 95 195; 6 95 195" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 95 195
                   C 55 190, 25 160, 35 120
                   C 40 100, 60 95, 65 112
                   C 68 128, 52 135, 45 122"
                fill="none" stroke="#231a14" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
        </g>

        <!-- back-far leg (behind body, muted shade, outlined to match the cat) -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="-18 128 195; 18 128 195; -18 128 195" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 128 195 C 122 230, 118 270, 122 300" stroke="#231a14" stroke-width="15" fill="none" stroke-linecap="round"/>
          <path d="M 128 195 C 122 230, 118 270, 122 300" stroke="#d9822f" stroke-width="10" fill="none" stroke-linecap="round"/>
          <ellipse cx="122" cy="302" rx="11" ry="6" fill="#f3ddb9" stroke="#231a14" stroke-width="4"/>
        </g>
        <!-- front-far leg (behind body, muted shade, outlined to match the cat) -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="-18 332 195; 18 332 195; -18 332 195" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 332 195 C 326 230, 322 270, 326 300" stroke="#231a14" stroke-width="15" fill="none" stroke-linecap="round"/>
          <path d="M 332 195 C 326 230, 322 270, 326 300" stroke="#d9822f" stroke-width="10" fill="none" stroke-linecap="round"/>
          <ellipse cx="326" cy="302" rx="11" ry="6" fill="#f3ddb9" stroke="#231a14" stroke-width="4"/>
        </g>

        <!-- body + head + ears silhouette (one continuous outline) -->
        <path d="M 85 235
                 C 55 215, 50 168, 88 148
                 C 115 133, 150 132, 180 136
                 C 212 130, 232 124, 248 108
                 C 262 95, 260 75, 240 60
                 L 275 100
                 L 300 55
                 L 335 95
                 C 355 105, 372 120, 378 145
                 C 382 170, 368 178, 356 192
                 C 346 204, 342 220, 345 235
                 C 325 254, 265 258, 210 257
                 C 155 258, 105 254, 85 235 Z"
              fill="#f2a961" stroke="#231a14" stroke-width="7" stroke-linejoin="round"/>

        <!-- inner ears -->
        <path d="M 246 78 L 240 60 L 262 88 Z" fill="#ffc9c9"/>
        <path d="M 306 76 L 300 55 L 322 86 Z" fill="#ffc9c9"/>

        <!-- back + head stripes -->
        <path d="M 135 168 Q 150 160 168 165" stroke="#d9822f" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M 195 152 Q 210 145 225 150" stroke="#d9822f" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M 262 95 Q 270 108 262 122" stroke="#d9822f" stroke-width="6" fill="none" stroke-linecap="round"/>

        <!-- front-near leg (on top, full color to match body) -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="18 340 195; -18 340 195; 18 340 195" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 340 195 C 346 230, 350 270, 346 300" stroke="#231a14" stroke-width="15" fill="none" stroke-linecap="round"/>
          <path d="M 340 195 C 346 230, 350 270, 346 300" stroke="#f2a961" stroke-width="10" fill="none" stroke-linecap="round"/>
          <ellipse cx="346" cy="302" rx="12" ry="7" fill="#fbe9c9" stroke="#231a14" stroke-width="4"/>
        </g>
        <!-- back-near leg (on top, full color to match body) -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="18 136 195; -18 136 195; 18 136 195" dur="0.5s" repeatCount="indefinite"/>
          <path d="M 136 195 C 142 230, 146 270, 142 300" stroke="#231a14" stroke-width="15" fill="none" stroke-linecap="round"/>
          <path d="M 136 195 C 142 230, 146 270, 142 300" stroke="#f2a961" stroke-width="10" fill="none" stroke-linecap="round"/>
          <ellipse cx="142" cy="302" rx="12" ry="7" fill="#fbe9c9" stroke="#231a14" stroke-width="4"/>
        </g>

        <!-- eye -->
        <g class="eye">
          <ellipse cx="345" cy="118" rx="10" ry="13" fill="#231a14"/>
        </g>

        <!-- nose + mouth -->
        <ellipse cx="376" cy="142" rx="6" ry="5" fill="#231a14"/>
        <path d="M 376 147 Q 368 156 358 150" stroke="#231a14" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- whiskers -->
        <line x1="330" y1="130" x2="365" y2="122" stroke="#7a7a7a" stroke-width="2.5"/>
        <line x1="330" y1="140" x2="366" y2="136" stroke="#7a7a7a" stroke-width="2.5"/>

      </svg>
    </div>
  </div>
</div>

</body>
</html>

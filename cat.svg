<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <style>
    .eye {
      transform-box: fill-box;
      transform-origin: center;
      animation: blink 4.5s infinite;
    }
    .eye-right { animation-delay: 0.05s; }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      93% { transform: scaleY(0.1); }
      96% { transform: scaleY(1); }
    }
  </style>

  <!-- flat pale background -->
  <rect x="0" y="0" width="500" height="500" fill="#f7f1c9"/>

  <!-- ================= TAIL (single outline, curled in front) ================= -->
  <path d="M 150 385
           C 90 385, 65 330, 90 290
           C 105 266, 135 262, 145 280
           C 153 295, 140 310, 122 305
           C 110 301, 108 288, 118 282"
        fill="#f2a961" stroke="#231a14" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 118 300 C 128 296, 132 288, 128 280" stroke="#d9822f" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 100 320 C 112 322, 122 315, 122 305" stroke="#d9822f" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- ================= WHOLE CAT SILHOUETTE (one continuous outline: ears + head + body) ================= -->
  <path d="M 148 85
           L 175 160
           C 152 200, 138 260, 145 310
           C 150 350, 150 385, 175 402
           C 200 415, 300 415, 325 402
           C 350 385, 350 350, 355 310
           C 362 260, 348 200, 325 160
           L 352 85
           L 300 138
           C 280 150, 220 150, 200 138
           Z"
        fill="#f2a961" stroke="#231a14" stroke-width="7" stroke-linejoin="round"/>

  <!-- inner ear color (no extra outline, sits inside the silhouette) -->
  <path d="M 184 152 L 165 108 L 213 140 Z" fill="#ffc9c9"/>
  <path d="M 316 152 L 335 108 L 287 140 Z" fill="#ffc9c9"/>

  <!-- chest / belly patch (no outline, blends into body) -->
  <ellipse cx="250" cy="345" rx="52" ry="58" fill="#fbe9c9"/>

  <!-- forehead stripes -->
  <path d="M 214 145 Q 222 160 216 176" stroke="#d9822f" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 250 138 Q 250 155 250 173" stroke="#d9822f" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 286 145 Q 278 160 284 176" stroke="#d9822f" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- body stripes -->
  <path d="M 160 300 Q 176 312 164 330" stroke="#d9822f" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 340 300 Q 324 312 336 330" stroke="#d9822f" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- simple leg + paw lines (no separate outlined shapes) -->
  <path d="M 215 335 C 213 360, 213 382, 218 398" stroke="#231a14" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 285 335 C 287 360, 287 382, 282 398" stroke="#231a14" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 204 398 Q 218 407 232 398" stroke="#231a14" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 268 398 Q 282 407 296 398" stroke="#231a14" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- ================= EYES (simple flat dots) ================= -->
  <g class="eye eye-left">
    <ellipse cx="218" cy="228" rx="11" ry="13" fill="#231a14"/>
  </g>
  <g class="eye eye-right">
    <ellipse cx="282" cy="228" rx="11" ry="13" fill="#231a14"/>
  </g>

  <!-- nose -->
  <ellipse cx="250" cy="254" rx="7" ry="5" fill="#231a14"/>

  <!-- mouth -->
  <path d="M 250 259 L 250 266" stroke="#231a14" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 250 266 Q 238 270 232 262" stroke="#231a14" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 250 266 Q 262 270 268 262" stroke="#231a14" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- whiskers (short dashes) -->
  <line x1="150" y1="236" x2="178" y2="240" stroke="#231a14" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="250" x2="177" y2="250" stroke="#231a14" stroke-width="3" stroke-linecap="round"/>
  <line x1="350" y1="236" x2="322" y2="240" stroke="#231a14" stroke-width="3" stroke-linecap="round"/>
  <line x1="352" y1="250" x2="323" y2="250" stroke="#231a14" stroke-width="3" stroke-linecap="round"/>

</svg>
